<div class="card">
    <div class="card-header text-white">
        <h5>Authentication</h5>
    </div>
    <div class="card-body">
        <h6>Login </h6>
        <hr class="my-1">

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

            <label class="form-label">Email</label>
            <input type="email" formControlName="email" class="form-control" placeholder="Enter Your Email">
            @if (loginForm.get('email')?.touched && loginForm.get('email')?.invalid) {
            <div class="text-danger">A valid email is required.</div>
            }
            <label class="form-label">Password</label>
            <input type="password" formControlName="password" class="form-control" placeholder="Enter Your password">
            @if (loginForm.get('password')?.touched && loginForm.get('password')?.invalid) {
            <div class="text-danger">Password must be at least 6 characters.</div>
            }
            <div class="d-flex justify-content-center ">
                <button type="submit" class="btn btn-primary mt-3  w-50">Login</button>
            </div>

        </form>
    </div>
</div>
