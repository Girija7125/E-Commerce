<div class="card m-0 ">
    <div class="card-header text-white">
        <h5>OrderList</h5>
    </div>
    <div class="card-body p-0">
        <table class="table p-3">
            <thead class="table-light">
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                @for(order of orders;track order.id){
                <tr>
                    <td>{{order.id}}</td>
                    <td>{{order.customer}}</td>
                    <td><span class="badge" [ngClass]="'bg-' + order.statusColor">
                            {{ order.status }}
                        </span></td>
                </tr>

                }
            </tbody>
        </table>
        <div class="d-flex justify-content-center">
    <button 
      (click)="viewOrder()" 
      class="btn btn-primary text-white btn-sm w-50  mb-3">
      <strong>View Order</strong>
    </button>
    </div>

    </div>
</div>
