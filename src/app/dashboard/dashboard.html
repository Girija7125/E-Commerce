<div class="container-fluid mt-3 p-3 ms-3">

  @if(auth.isAdmin()||auth.isUser()) {

    <div class="row">
      <div class="col-4">
        <app-authentication></app-authentication>
      </div>

      <div class="col-4">
        <app-products [limit]="3"></app-products>
      </div>

      <div class="col-4">
        <app-orders [limit]="3"></app-orders>
      </div>
    </div>

    <div class="row pt-3">
      <div class="col-12">
        <app-customers [limit]="3"></app-customers>
      </div>
    </div>

  }


  @else {
    <div class="alert alert-danger text-center">
      <h5>Access Denied <i class="fa fa-ban" aria-hidden="true"></i></h5>
      <p>You are not authorized to view this dashboard.</p>
    </div>
  }

</div>
